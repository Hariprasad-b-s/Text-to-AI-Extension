<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AI Side Panel</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1e1e1e;
      color: #fff;
      font-family: sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #ffffff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px auto;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>Loading AI Chat...</p>
    <p style="font-size: 11px; color: #aaa; margin-top: 10px; max-width: 80%; margin-left: auto; margin-right: auto;">
      Please ensure you are logged in to the AI service. If you are not logged in, please log in here.
    </p>
  </div>
  <iframe id="chat-frame" allow="clipboard-read; clipboard-write"></iframe>
  <script src="sidepanel.js"></script>
</body>
</html>
